name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  docs-contract:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run check:docs

  quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build

  chromium:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium
      - run: npm test
        env:
          CI: "true"
      - run: npm run acceptance:fixture
        env:
          CI: "true"
      - uses: actions/upload-artifact@v5
        if: failure()
        with:
          name: chromium-evidence
          path: |
            playwright-report/
            test-results/
            .lakda/acceptance/
          if-no-files-found: ignore
          retention-days: 14

  package-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: RNA4219/harness-auto-test-evidence
          ref: 3a4b655c2434109e230f8b862a9d5fe14f1c069e
          path: .upstream-hate
          sparse-checkout: |
            schemas/HATE/v1/artifact-manifest.schema.json
          sparse-checkout-cone-mode: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run check:hate
        env:
          HATE_UPSTREAM_SCHEMA: .upstream-hate/schemas/HATE/v1/artifact-manifest.schema.json
      - run: npm run pack:check
      - run: node dist/cli.js --help
      - run: |
          $before = git status --porcelain
          node dist/cli.js doctor
          $after = git status --porcelain
          if ($before -ne $after) { throw "doctor changed the worktree" }
